name: 烟草库存监控

on:
  schedule:
    # 每15分钟跑一次(GitHub Actions cron 漂移 ±5-15 分钟)
    # 注意:时间用 UTC,北京时间 = UTC + 8
    - cron: '*/15 * * * *'
  workflow_dispatch: # 支持手动触发(在 Actions 页面点 Run workflow)

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 安装 Playwright 浏览器(SP站需要无头浏览器过盾)
        run: npx playwright install --with-deps chromium

      - name: 编译 TypeScript
        run: npm run build

      - name: 运行监控
        env:
          QY_WECHAT_WEBHOOK: ${{ secrets.QY_WECHAT_WEBHOOK }}
        run: node dist/index.js
