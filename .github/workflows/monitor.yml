name: 烟草库存监控

on:
  workflow_dispatch: # 仅支持手动/外部API触发(cron-job.org 定时调用 GitHub API)

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 安装 Playwright 浏览器(SP站需要无头浏览器过盾)
        run: npx playwright install --with-deps chromium

      - name: 编译 TypeScript
        run: npm run build

      - name: 运行监控
        env:
          QY_WECHAT_WEBHOOK: ${{ secrets.QY_WECHAT_WEBHOOK }}
        run: node dist/index.js
